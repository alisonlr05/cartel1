<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>La Sede Te Acompaña - UCR</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="index.css"/>
</head>
<body>

<div class="poster">

  <!-- Encabezado con título animado -->
  <div class="header">

    <div class="title-block">
      <!-- Fila 1: ¡LA SEDE -->
      <div class="title-line">
        <span class="badge badge-excl-open">¡</span>
        <span class="badge badge-la">La</span>
        <span class="badge badge-sede">Sede</span>
      </div>
      <!-- Fila 2: TE ACOMPAÑA! -->
      <div class="title-line">
        <span class="badge badge-te">Te</span>
        <span class="badge badge-acompana">Acompaña</span>
        <span class="badge badge-excl-close">!</span>
      </div>
    </div>

  </div>

  <!-- Subtítulo -->
  <div class="subtitle">
    <p>El respeto no se negocia</p>
    <p class="stop">¡Pará ya de acosar!</p>
  </div>

  <!-- Código QR -->
  <div class="qr-section">
    <p>Si necesitas ayuda, escanea este QR</p>
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=80x80&data=https://ucr.ac.cr" alt="QR UCR"/>
  </div>

  <!-- Imagen de personas -->
  <div class="people">
    <img src="ucr.jpg" alt="Personas UCR" class="people-img"/>
  </div>

  <!-- Barra de logos -->
  <div class="footer">
    <div class="footer-logo">UCR</div>
    <div class="divider"></div>
    <div class="footer-middle">
      <span>UCR</span>
      <span>Libre de</span>
      <span>Acoso Sexual</span>
    </div>
    <div class="divider"></div>
    <div class="footer-right">
      <p><strong>SG</strong></p>
      <p>Sede de<br/>Guanacaste</p>
    </div>
  </div>

  <!-- Imagen inferior -->
  <div class="bottom-image-wrap">
    <img
      src="descarga.png"
      alt="Imagen UCR"
      onerror="this.style.display='none'"
    />
  </div>

</div>

</body>
</html>
