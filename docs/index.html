<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carteles UCR</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Poppins:wght@400;600;700&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="index.css"/>
</head>
<body>

<div class="slides-wrapper">

  <!-- ── SLIDE 1: La Sede Te Acompaña ── -->
  <div class="slide active" id="slide-1">
    <div class="poster">

      <div class="header">
        <div class="title-block">
          <div class="title-line">
            <span class="badge badge-excl-open">¡</span>
            <span class="badge badge-la">La</span>
            <span class="badge badge-sede">Sede</span>
          </div>
          <div class="title-line">
            <span class="badge badge-te">Te</span>
            <span class="badge badge-acompana">Acompaña</span>
            <span class="badge badge-excl-close">!</span>
          </div>
        </div>
      </div>

      <div class="subtitle">
        <p>El respeto no se negocia</p>
        <p class="stop">¡Pará ya de acosar!</p>
      </div>

      <div class="qr-section">
        <p>Si necesitas ayuda, escanea este QR</p>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=80x80&data=https://ucr.ac.cr" alt="QR UCR"/>
      </div>

      <div class="people">
        <img src="ucr.jpg" alt="Personas UCR" class="people-img"/>
      </div>

      <div class="footer">
        <div class="footer-logo">UCR</div>
        <div class="divider"></div>
        <div class="footer-middle">
          <span>UCR</span>
          <span>Libre de</span>
          <span>Acoso Sexual</span>
        </div>
        <div class="divider"></div>
        <div class="footer-right">
          <p><strong>SG</strong></p>
          <p>Sede de<br/>Guanacaste</p>
        </div>
      </div>

      <div class="bottom-image-wrap">
        <img src="descarga.png" alt="Imagen UCR" onerror="this.style.display='none'"/>
      </div>

    </div>

    <button class="nav-btn" id="btn-to-2" onclick="goTo(2)">
      Ver cartel de señalización
      <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="20" y2="12"/><polyline points="13 5 20 12 13 19"/></svg>
    </button>
  </div>

  <!-- ── SLIDE 2: Cartel de señalización UCR ── -->
  <div class="slide" id="slide-2">

    <div class="pole-wrapper">
      <div class="pole-top"></div>

      <div class="sign">
        <div class="screw"></div>
        <div class="sign-body">

          <div class="sign-row">
            <span class="row-label">Aulas 5, 6, 7</span>
            <div class="arrow-wrap">
              <svg class="arrow" viewBox="0 0 24 24"><line x1="3" y1="12" x2="20" y2="12"/><polyline points="13 5 20 12 13 19"/></svg>
            </div>
          </div>

          <div class="sign-row">
            <span class="row-label">Apoyo Informático</span>
            <div class="arrow-wrap">
              <svg class="arrow" viewBox="0 0 24 24"><line x1="3" y1="12" x2="20" y2="12"/><polyline points="13 5 20 12 13 19"/></svg>
            </div>
          </div>

          <div class="sign-row">
            <span class="row-label">Servidores</span>
            <div class="arrow-wrap">
              <svg class="arrow" viewBox="0 0 24 24"><line x1="3" y1="12" x2="20" y2="12"/><polyline points="13 5 20 12 13 19"/></svg>
            </div>
          </div>

          <div class="sign-row">
            <span class="row-label">Laboratorio 1 y 2</span>
            <div class="arrow-wrap">
              <svg class="arrow" viewBox="0 0 24 24"><line x1="3" y1="12" x2="20" y2="12"/><polyline points="13 5 20 12 13 19"/></svg>
            </div>
          </div>

          <div class="sign-row">
            <span class="row-label">Coordinación<br>Informática Empresarial</span>
            <div class="arrow-wrap">
              <svg class="arrow" viewBox="0 0 24 24"><line x1="3" y1="12" x2="20" y2="12"/><polyline points="13 5 20 12 13 19"/></svg>
            </div>
          </div>

        </div>

        <div class="sign-footer">
          <span class="ucr-logo">UCR</span>
        </div>
      </div>

      <div class="pole-bottom"></div>
    </div>

    <button class="nav-btn" id="btn-to-1" onclick="goTo(1)">
      <svg viewBox="0 0 24 24"><line x1="21" y1="12" x2="4" y2="12"/><polyline points="11 19 4 12 11 5"/></svg>
      Volver al cartel anterior
    </button>
  </div>

  <!-- Dots -->
  <div class="dots">
    <div class="dot active" id="dot-1"></div>
    <div class="dot" id="dot-2"></div>
  </div>

</div>

<script>
  function goTo(n) {
    document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
    document.getElementById('slide-' + n).classList.add('active');
    document.getElementById('dot-' + n).classList.add('active');
  }
</script>

</body>
</html>
